<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Theory Chat — ReLU.chat</title>
<meta name="description" content="On-device NLU assistant for game theory concepts: Nash equilibrium, Shapley value, auctions, and more.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://reult.chat/chat/game-theory-chat/">

<meta property="og:title" content="Game Theory Chat — ReLU.chat">
<meta property="og:description" content="On-device NLU assistant for game theory concepts.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://reult.chat/chat/game-theory-chat/">
<meta property="og:image" content="https://reult.chat/assets/logo.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Game Theory Chat — ReLU.chat">
<meta name="twitter:description" content="On-device NLU assistant for game theory concepts.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="css/styles.css">

<link rel="icon" href="../../assets/logo.png" type="image/png">
</head>
<body>

<header>
  <a href="/" class="back-btn" aria-label="Back to home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <div>
    <div class="title">Game Theory Chat</div>
    <div class="subtitle">On-device AI assistant</div>
  </div>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Loading...</span>
  </div>
</header>

<div class="progress"><div id="progress-bar"></div></div>

<main id="messages" role="log" aria-live="polite" aria-label="Chat messages">
  <div class="msg bot">
    <div class="meta">
      <span class="chip intent">Welcome</span>
    </div>
    <div>Hey! I'm your on-device game theory assistant. Ask me about:</div>
    <div class="suggestions" style="margin-top:12px; padding:0; overflow-x:auto; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="suggestion" data-q="What is Nash equilibrium?">Nash equilibrium</button>
      <button class="suggestion" data-q="Explain the Prisoner's Dilemma">Prisoner's Dilemma</button>
      <button class="suggestion" data-q="What is the Shapley value?">Shapley value</button>
      <button class="suggestion" data-q="How do auctions work?">Auctions</button>
    </div>
  </div>
</main>

<div class="suggestions" id="suggestions">
  <button class="suggestion" data-q="What is a mixed strategy?">Mixed strategy</button>
  <button class="suggestion" data-q="Explain zero-sum games">Zero-sum games</button>
  <button class="suggestion" data-q="What is evolutionary game theory?">Evolutionary GT</button>
  <button class="suggestion" data-q="Tell me about the Centipede game">Centipede game</button>
  <button class="suggestion" data-q="What is mechanism design?">Mechanism design</button>
</div>

<form id="chat-form">
  <input id="input" type="text" placeholder="Ask about game theory..." autocomplete="off" aria-label="Message input">
  <button id="send" type="submit" disabled aria-label="Send message">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</form>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
