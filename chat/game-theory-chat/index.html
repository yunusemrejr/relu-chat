<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none';">
<title>Game Theory Chat — ReLU.chat</title>
<meta name="description" content="On-device NLU assistant for game theory concepts: Nash equilibrium, Shapley value, auctions, and more.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://relu.chat/chat/game-theory-chat/">

<meta property="og:title" content="Game Theory Chat — ReLU.chat">
<meta property="og:description" content="On-device NLU assistant for game theory concepts.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://relu.chat/chat/game-theory-chat/">
<meta property="og:image" content="https://relu.chat/assets/logo.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Game Theory Chat — ReLU.chat">
<meta name="twitter:description" content="On-device NLU assistant for game theory concepts.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="css/styles.css">

<link rel="icon" href="../../assets/logo.png" type="image/png">
</head>
<body>

<nav class="site-nav" id="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <img src="../../assets/logo.png" alt="ReLU.chat" width="28" height="28">
      <span>Game Theory Chat</span>
    </a>
    <div class="nav-status" id="status-container">
      <div class="status-indicator">
        <span class="status-dot" id="dot"></span>
      </div>
      <span id="status-text">loading model...</span>
    </div>
  </div>
</nav>

<div class="progress"><div id="bar"></div></div>

<main class="chat-layout">
  <div class="chat-container">
    <div class="chat-header-mobile">
      <a href="/" class="back-btn" aria-label="Back to home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="chat-title-mobile">
      <span>ReLU.chat — Game Theory</span>
        <small>On-device AI assistant</small>
      </div>
    </div>

    <div id="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <!-- Initial welcome message will be managed by JS for consistency -->
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion" data-q="What is a mixed strategy?">Mixed strategy</button>
      <button class="suggestion" data-q="Explain zero-sum games">Zero-sum games</button>
      <button class="suggestion" data-q="What is evolutionary game theory?">Evolutionary GT</button>
      <button class="suggestion" data-q="Tell me about the Centipede game">Centipede game</button>
      <button class="suggestion" data-q="What is mechanism design?">Mechanism design</button>
    </div>
  </div>

  <form id="form">
    <div class="input-container">
      <input id="input" type="text" placeholder="Ask about game theory..." autocomplete="off" aria-label="Message input">
      <button id="send" type="submit" disabled aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
