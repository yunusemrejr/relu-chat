<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#08090a" />
<meta name="description" content="On-device game theory chatbot — privacy-first, browser-based interactive learning for Nash equilibrium, Shapley value, auctions and more.">
<title>Game Theory Chat — ReLU.chat</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<link rel="icon" href="../../assets/logo.png" type="image/png">
</head>
<body>
<header>
  <a href="../../" class="back-btn" aria-label="Back to home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
  </div>
  <div>
    <div class="title">Game Theory Chat</div>
    <div class="subtitle">On-device NLU · Privacy-first</div>
  </div>
  <div class="status" id="status"><span class="dot" id="dot"></span><span id="statusText">loading…</span></div>
</header>
<div class="progress"><div id="bar"></div></div>

<div id="messages"></div>

<div class="suggestions" id="suggestions"></div>

<form id="form" autocomplete="off">
  <textarea id="input" rows="1" placeholder="Ask about Nash equilibrium, Shapley value, auctions…" enterkeyhint="send"></textarea>
  <button id="send" type="submit">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</form>

<script type="module" src="js/app.js"></script>
</body>
</html>
